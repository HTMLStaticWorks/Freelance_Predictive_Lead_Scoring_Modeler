<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Access Sales Portal - Scorelytics</title>
    
    <!-- Favicon -->
    <link rel="icon" href="assets/images/favicon.png" type="image/png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, #0F172A 0%, #020617 100%);
            padding: 40px 20px;
            position: relative;
        }

        [data-theme="light"] .auth-wrapper {
            background: radial-gradient(circle at top right, #F8FAFC 0%, #F1F5F9 100%);
        }

        .auth-form-container {
            width: 100%;
            max-width: 480px;
            background: #020617;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        [data-theme="light"] .auth-form-container {
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }

        .password-field-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #64748b;
            transition: color 0.3s;
        }

        .password-toggle:hover {
            color: #fff;
        }

        [data-theme="light"] .password-toggle:hover {
            color: #0F172A;
        }

        .auth-nav-toggles {
            position: absolute;
            top: 30px;
            right: 30px;
            display: flex;
            gap: 15px;
        }

        .nav-icon-btn {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.25rem;
        }

        [data-theme="light"] .nav-icon-btn {
            background: #ffffff;
            color: #0F172A;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .nav-icon-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        [data-theme="light"] .nav-icon-btn:hover {
            background: #F1F5F9;
            border-color: rgba(0, 0, 0, 0.2);
        }

        .auth-link:hover {
            text-decoration: underline !important;
        }

        .auth-text {
            color: #ffffff;
        }

        [data-theme="light"] .auth-text {
            color: #0F172A;
        }

        .form-control.auth-input {
            background-color: #0F172A !important;
            border-color: rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }

        [data-theme="light"] .form-control.auth-input {
            background-color: #F8FAFC !important;
            border-color: rgba(0, 0, 0, 0.1) !important;
            color: #0F172A !important;
        }
    </style>
</head>

<body>

    <div class="auth-wrapper">
        <!-- Theme & RTL Toggles -->
        <div class="auth-nav-toggles">
            <button class="nav-icon-btn rtl-toggle-btn" title="Toggle RTL">
                <i class="ph ph-arrows-left-right"></i>
            </button>
            <button class="nav-icon-btn theme-toggle-btn" title="Toggle Theme">
                <i class="ph ph-moon theme-toggle-icon"></i>
            </button>
        </div>

        <!-- Form Side -->
        <div class="auth-form-container">
            <div class="w-100" style="max-width: 380px;">
                <div class="text-center mb-5">
                    <a href="index.html" class="d-inline-flex align-items-center gap-2 text-decoration-none">
                        <div class="bg-primary p-2 rounded-3 text-white d-flex"><i class="ph-bold ph-chart-line-up"></i>
                        </div>
                        <span class="fw-bold fs-4 tracking-tight brand-text">SCORELYTICS</span>
                    </a>
                </div>

                <h3 class="fw-bold auth-text mb-2 text-center">Welcome Back</h3>
                <p class="text-muted small mb-4 text-center">Enter your credentials to access the sales portal.</p>

                <form class="needs-validation" novalidate>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">Email Address</label>
                        <input type="email" class="form-control auth-input py-2"
                            placeholder="name@company.com" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted mb-1">Password</label>
                        <div class="password-field-wrapper">
                            <input type="password" id="password"
                                class="form-control auth-input py-2 pe-5" placeholder="••••••••"
                                required>
                            <i class="ph ph-eye password-toggle" id="togglePassword"></i>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check mb-0">
                            <input type="checkbox" class="form-check-input" id="remember">
                            <label class="form-check-label small text-muted" for="remember">Keep me logged in</label>
                        </div>
                        <a href="#" class="small text-primary text-decoration-none auth-link">Forgot Password?</a>
                    </div>

                    <a href="dashboard.html" class="btn btn-primary w-100 py-2 mb-4 fw-bold">Sign In</a>
                </form>

                <div class="text-center">
                    <div class="d-flex align-items-center gap-3 mb-4">
                        <hr class="flex-grow-1 border-secondary opacity-25">
                        <span class="small text-muted text-uppercase tracking-widest" style="font-size: 0.7rem;">Or
                            continue with</span>
                        <hr class="flex-grow-1 border-secondary opacity-25">
                    </div>

                    <div class="d-flex gap-2 mb-5">
                        <button
                            class="btn btn-outline-secondary w-100 btn-sm py-2 d-flex align-items-center justify-content-center gap-2">
                            <i class="ph ph-google-logo"></i> Google
                        </button>
                        <button
                            class="btn btn-outline-secondary w-100 btn-sm py-2 d-flex align-items-center justify-content-center gap-2">
                            <i class="ph ph-apple-logo"></i> Apple
                        </button>
                        <button
                            class="btn btn-outline-secondary w-100 btn-sm py-2 d-flex align-items-center justify-content-center gap-2">
                            <i class="ph ph-facebook-logo"></i> Facebook
                        </button>
                    </div>

                    <p class="small text-muted mb-0">Don't have an account? <a href="signup.html"
                            class="text-primary fw-bold text-decoration-none auth-link">Register</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        // Password Visibility Toggle
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');

        togglePassword.addEventListener('click', function (e) {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.classList.toggle('ph-eye');
            this.classList.toggle('ph-eye-slash');
        });

        // Theme Toggle (Simplified for demo)
        document.getElementById('theme-toggle').addEventListener('click', function() {
            const html = document.documentElement;
            const icon = this.querySelector('i');
            if (html.getAttribute('data-theme') === 'dark') {
                html.setAttribute('data-theme', 'light');
                icon.classList.replace('ph-moon', 'ph-sun');
            } else {
                html.setAttribute('data-theme', 'dark');
                icon.classList.replace('ph-sun', 'ph-moon');
            }
        });

        // RTL Toggle (Simplified for demo)
        document.getElementById('rtl-toggle').addEventListener('click', function() {
            const html = document.documentElement;
            if (html.getAttribute('dir') === 'rtl') {
                html.removeAttribute('dir');
            } else {
                html.setAttribute('dir', 'rtl');
            }
        });
    </script>
</body>
</html>
