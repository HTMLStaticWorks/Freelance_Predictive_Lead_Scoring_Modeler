<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launching Soon | Scorelytics Data Science</title>
    
    <!-- Favicon -->
    <link rel="icon" href="assets/images/favicon.png" type="image/png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    
    <style>
        .coming-soon-bg {
            min-height: 100vh;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .data-particle {
            position: absolute;
            background: var(--accent-color);
            border-radius: 50%;
            opacity: 0.1;
            filter: blur(10px);
            animation: float 20s infinite linear;
        }
        @keyframes float {
            0% { transform: translate(0, 0); }
            50% { transform: translate(100px, 100px); }
            100% { transform: translate(0, 0); }
        }
        .countdown-item {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 12px;
            min-width: 100px;
        }
    </style>
</head>
<body class="bg-dark">

    <div class="coming-soon-bg text-white">
        <!-- Particles -->
        <div class="data-particle" style="width: 300px; height: 300px; top: -100px; left: -100px;"></div>
        <div class="data-particle" style="width: 200px; height: 200px; bottom: -50px; right: -50px; animation-delay: -5s;"></div>

        <div class="container text-center z-1">
            <div class="bg-primary d-inline-flex p-3 rounded-4 mb-4"><i class="ph-bold ph-rocket-launch fs-1"></i></div>
            <h1 class="display-3 fw-bold mb-3">The Model Is Training</h1>
            <p class="lead opacity-75 mb-5 mx-auto" style="max-width: 600px;">Launch Coming Soon. We're finalizing our predictive engine to deliver unparalleled lead scoring accuracy.</p>
            
            <!-- Countdown -->
            <div class="d-flex justify-content-center gap-3 mb-5" id="countdown">
                <div class="countdown-item">
                    <div class="h2 fw-bold mb-0" id="days">14</div>
                    <div class="small opacity-50">Days</div>
                </div>
                <div class="countdown-item">
                    <div class="h2 fw-bold mb-0" id="hours">08</div>
                    <div class="small opacity-50">Hours</div>
                </div>
                <div class="countdown-item">
                    <div class="h2 fw-bold mb-0" id="minutes">45</div>
                    <div class="small opacity-50">Mins</div>
                </div>
            </div>

            <!-- Progress -->
            <div class="mx-auto mb-5" style="max-width: 400px;">
                <div class="d-flex justify-content-between mb-2 small">
                    <span>Model accuracy: <span class="text-primary fw-bold">91.4%</span></span>
                    <span>Almost ready</span>
                </div>
                <div class="progress bg-white bg-opacity-10" style="height: 10px;">
                    <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 91%"></div>
                </div>
            </div>

            <!-- Lead Capture -->
            <div class="mx-auto" style="max-width: 500px;">
                <p class="small opacity-75 mb-4">Get early access + free lead scoring audit when we launch.</p>
                <form class="d-flex gap-2">
                    <input type="email" class="form-control bg-dark border-secondary text-white" placeholder="Email address">
                    <button class="btn btn-primary px-4">Join Waitlist</button>
                </form>
            </div>

            <!-- Social -->
            <div class="mt-5 pt-4 d-flex justify-content-center gap-4 opacity-50">
                <a href="#" class="text-white"><i class="ph ph-linkedin-logo fs-3"></i></a>
                <a href="#" class="text-white"><i class="ph ph-github-logo fs-3"></i></a>
                <a href="#" class="text-white"><i class="ph ph-twitter-logo fs-3"></i></a>
            </div>
        </div>
    </div>

    <script>
        // Simple Countdown Logic
        const launchDate = new Date();
        launchDate.setDate(launchDate.getDate() + 14);

        function updateCountdown() {
            const now = new Date();
            const diff = launchDate - now;
            
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

            document.getElementById('days').innerText = d.toString().padStart(2, '0');
            document.getElementById('hours').innerText = h.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
    <script src="assets/js/main.js"></script>
</body>
</html>
